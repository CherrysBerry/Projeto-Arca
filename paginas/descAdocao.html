<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto ARCA - Adoção</title>
    <link rel="stylesheet" href="../assets/css/descAdocao.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <header>
        <div>
            <a href="../index.html" class="logo" style="color: #F9AF58;">Projeto ARCA</a>
        </div>
        <nav>
            <ul>
                <li><a href="./consulta.html">Agende uma Consulta</a></li>
                <li><a href="./adocao.html">Adoção</a></li>
                <li><a href="./denuncias.html">Denúncias</a></li>
                <li><a href="#" onclick="redirecionarSolicitacoes(event)">Solicitações</a></li>
                <li><a href="./saibaMais.html">Saiba Mais</a></li>
                <li>
                    <div class="perfil">
                        <button id="botaoPerfil" onclick="toggleMenu()">
                            <img src="../imgs/Profile.png" alt="imagem de perfil">
                        </button>
                        <div class="dropdownPerfil" id="dropdownPerfil">
                            <a href="./login.html" id="link-login-menu" style="color: #3D1B07;">Log in</a>
                            <span id="usuario-logado-menu"
                                style="display: none; color: #3D1B07; font-size: 14px; text-align: left; line-height: 1.4;">
                                Logado como:<br><strong style="color: #734930;" id="nome-usuario-container"></strong>
                            </span>
                            <hr>
                            <input type="checkbox" id="modoEscuro">
                            <label for="modoEscuro">Modo Escuro</label>
                        </div>
                    </div>
            </ul>
        </nav>
    </header>
    <main class="animal-container">

        <section class="animal-card">

            <div class="animal-foto" onclick="document.getElementById('upload-foto').click();"
                title="Clique para alterar a foto">
                <input type="file" id="upload-foto" accept="image/*" style="display: none;">
                <img id="foto-preview"
                    src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
                    alt="Clique para adicionar uma foto">
            </div>

            <div class="animal-info">
                <div class="form-group">
                    <label>Nome:</label>
                    <input type="text" value="Thor">
                </div>

                <div class="form-group">
                    <label>Gênero:</label>
                    <input type="text" value="Macho">
                </div>

                <div class="form-group">
                    <label>Idade:</label>
                    <input type="text" value="3 anos">
                </div>

                <div class="form-group">
                    <label>Necessidade especial:</label>
                    <input type="text" value="Não possui">
                </div>

                <div class="form-group">
                    <label>Porte:</label>
                    <input type="text" value="Médio">
                </div>
            </div>

            <div class="animal-descricao">
                <label class="desc-title">Descrição:</label>
                <textarea
                    rows="4">Thor é um cachorro muito dócil, brincalhão e sociável. Procura uma família que possa oferecer carinho, atenção e um lar cheio de amor.</textarea>
            </div>

            <div class="adotar-btn">
                <button class="btn-adotar">
                    Desejo adotar
                </button>
            </div>

        </section>

    </main>

    <footer>
        <p>
            &copy; SEICIT/SUBTI - Subsecretaria de Tecnologia da Informação<br>
            Rua Maestro Antônio Cícero, 111, Caçaroca, Prefeitura, Serra/ES, CEP 29176-11
        </p>
    </footer>

    <script>
        document.getElementById('upload-foto').addEventListener('change', function (event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const preview = document.getElementById('foto-preview');
                    preview.src = e.target.result;
                }
                reader.readAsDataURL(file);
            }
        });
    </script>
    <script src="../assets/js/script.js"></script>
</body>

</html>
